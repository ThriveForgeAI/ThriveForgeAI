<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="ThriveForge AI — Building intelligent systems">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0720"/>
      <stop offset="60%" stop-color="#120a2a"/>
      <stop offset="100%" stop-color="#050314"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#6d28d9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edgeGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="editor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1235"/>
      <stop offset="100%" stop-color="#0f0822"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="55%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <style>
      .mono { font-family: "JetBrains Mono", "Fira Code", "SF Mono", Menlo, Consolas, monospace; }
      .hero { font-family: "Inter", "SF Pro Display", system-ui, sans-serif; font-weight: 800; letter-spacing: -0.02em; }
      .sub  { font-family: "Inter", "SF Pro Display", system-ui, sans-serif; font-weight: 500; letter-spacing: 0.01em; }
      .kw   { fill: #c084fc; }
      .fn   { fill: #60a5fa; }
      .str  { fill: #86efac; }
      .cm   { fill: #6b7280; font-style: italic; }
      .txt  { fill: #e5e7eb; }
      .dim  { fill: #9ca3af; }
      .num  { fill: #fbbf24; }
      @keyframes pulse { 0%,100% { opacity: 0.85; } 50% { opacity: 1; } }
      .caret { animation: pulse 1.1s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>
  <ellipse cx="820" cy="200" rx="520" ry="320" fill="url(#glow)" filter="url(#soft)"/>
  <ellipse cx="220" cy="340" rx="360" ry="220" fill="url(#glow)" opacity="0.55" filter="url(#soft)"/>

  <g opacity="0.18" stroke="#7c3aed" stroke-width="1">
    <path d="M0 80 H1200" /><path d="M0 160 H1200"/><path d="M0 240 H1200"/><path d="M0 320 H1200"/>
    <path d="M120 0 V400"/><path d="M360 0 V400"/><path d="M600 0 V400"/><path d="M840 0 V400"/><path d="M1080 0 V400"/>
  </g>

  <g transform="translate(60,40)">
    <text class="hero" font-size="58" fill="url(#title)">ThriveForge AI</text>
    <text class="sub" font-size="22" y="44" fill="#cbd5f5">Building intelligent systems that move businesses forward.</text>
    <g transform="translate(0,78)">
      <rect x="0" y="0" width="132" height="30" rx="15" fill="#1f1440" stroke="#7c3aed" stroke-opacity="0.55"/>
      <circle cx="16" cy="15" r="4" fill="#34d399"/>
      <text class="mono" x="28" y="19" font-size="13" fill="#e9d5ff">agentic · real-time</text>
      <rect x="144" y="0" width="118" height="30" rx="15" fill="#1f1440" stroke="#38bdf8" stroke-opacity="0.55"/>
      <circle cx="160" cy="15" r="4" fill="#60a5fa"/>
      <text class="mono" x="172" y="19" font-size="13" fill="#bae6fd">TypeScript · Go</text>
      <rect x="274" y="0" width="104" height="30" rx="15" fill="#1f1440" stroke="#f472b6" stroke-opacity="0.55"/>
      <circle cx="290" cy="15" r="4" fill="#f472b6"/>
      <text class="mono" x="302" y="19" font-size="13" fill="#fbcfe8">London · UK</text>
    </g>
  </g>

  <g transform="translate(620,60)">
    <rect x="-6" y="-6" width="532" height="292" rx="18" fill="url(#edgeGlow)" opacity="0.35" filter="url(#soft)"/>
    <rect x="0" y="0" width="520" height="280" rx="14" fill="url(#editor)" stroke="#3b2a6b" stroke-width="1"/>

    <rect x="0" y="0" width="520" height="38" rx="14" fill="#150c30"/>
    <rect x="0" y="24" width="520" height="14" fill="#150c30"/>
    <circle cx="22" cy="19" r="6" fill="#ff5f57"/>
    <circle cx="42" cy="19" r="6" fill="#febc2e"/>
    <circle cx="62" cy="19" r="6" fill="#28c840"/>

    <rect x="90" y="6" width="190" height="26" rx="6" fill="#1f1440" stroke="#3b2a6b"/>
    <circle cx="105" cy="19" r="4" fill="#38bdf8"/>
    <text class="mono" x="116" y="23" font-size="12" fill="#e9d5ff">AgenticWorkflows.ts</text>
    <text class="mono" x="264" y="23" font-size="12" fill="#6b7280">×</text>

    <rect x="286" y="6" width="150" height="26" rx="6" fill="#120a2a"/>
    <text class="mono" x="296" y="23" font-size="12" fill="#6b7280">pipeline.ts</text>

    <g transform="translate(24,64)" class="mono" font-size="13">
      <text y="0"><tspan class="dim">1</tspan><tspan class="cm" dx="18">// AgenticWorkOS — orchestrate AI across the business</tspan></text>
      <text y="22"><tspan class="dim">2</tspan><tspan class="kw" dx="18">import</tspan><tspan class="txt"> { </tspan><tspan class="fn">Agent</tspan><tspan class="txt">, </tspan><tspan class="fn">Workflow</tspan><tspan class="txt"> } </tspan><tspan class="kw">from</tspan><tspan class="str"> "thriveforge"</tspan><tspan class="txt">;</tspan></text>
      <text y="44"><tspan class="dim">3</tspan></text>
      <text y="66"><tspan class="dim">4</tspan><tspan class="kw" dx="18">const</tspan><tspan class="fn"> lead</tspan><tspan class="txt"> = </tspan><tspan class="kw">new</tspan><tspan class="fn"> Agent</tspan><tspan class="txt">({</tspan></text>
      <text y="88"><tspan class="dim">5</tspan><tspan class="txt" dx="34">role: </tspan><tspan class="str">"Lead Strategist"</tspan><tspan class="txt">,</tspan></text>
      <text y="110"><tspan class="dim">6</tspan><tspan class="txt" dx="34">tools: [</tspan><tspan class="str">"crm"</tspan><tspan class="txt">, </tspan><tspan class="str">"enrich"</tspan><tspan class="txt">, </tspan><tspan class="str">"outreach"</tspan><tspan class="txt">],</tspan></text>
      <text y="132"><tspan class="dim">7</tspan><tspan class="txt" dx="34">ttfb: </tspan><tspan class="num">120</tspan><tspan class="txt">,  </tspan><tspan class="cm">// ms, streaming</tspan></text>
      <text y="154"><tspan class="dim">8</tspan><tspan class="txt">});</tspan></text>
      <text y="176"><tspan class="dim">9</tspan></text>
      <text y="198"><tspan class="dim">10</tspan><tspan class="kw" dx="14">await</tspan><tspan class="fn"> Workflow</tspan><tspan class="txt">.</tspan><tspan class="fn">run</tspan><tspan class="txt">(lead, { </tspan><tspan class="txt">icp: </tspan><tspan class="str">"B2B · capital-intensive"</tspan><tspan class="txt"> });</tspan></text>
      <text y="220"><tspan class="dim">11</tspan><tspan class="cm" dx="14">// ✓ 42 meetings booked · 0 manual handoffs</tspan><tspan class="caret" fill="#a855f7">▍</tspan></text>
    </g>
  </g>

  <g transform="translate(60,330)">
    <text class="mono" font-size="13" fill="#9ca3af">$ </text>
    <text class="mono" font-size="13" x="14" fill="#e5e7eb">agenticworkos deploy --env=prod</text>
    <text class="mono" font-size="13" y="22" fill="#86efac">✓ 18 agents online · streaming · observable</text>
  </g>

  <rect x="0" y="398" width="1200" height="2" fill="url(#edgeGlow)" opacity="0.7"/>
</svg>
